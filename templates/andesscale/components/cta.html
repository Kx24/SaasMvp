<!-- 
  ANDESSCALE — components/cta.html
   Sección estática: CTA de fondo oscuro con orbs animados.
 
-->

<section class="py-24 bg-gradient-to-br from-slate-900 via-slate-800 to-slate-900 relative overflow-hidden"
         x-data="{ mouseX: 0, mouseY: 0 }"
         @mousemove="mouseX = $event.clientX / window.innerWidth; mouseY = $event.clientY / window.innerHeight">

    <div class="absolute inset-0" aria-hidden="true">
        <div class="absolute top-0 left-1/4 w-96 h-96 bg-primary/20 rounded-full blur-3xl animate-float transition-transform duration-1000"
             :style="`transform: translate(${mouseX * 50}px, ${mouseY * 50}px)`"></div>
        <div class="absolute bottom-0 right-1/4 w-80 h-80 bg-indigo-400/20 rounded-full blur-3xl animate-float transition-transform duration-1000"
             style="animation-delay:-3s;"
             :style="`transform: translate(${mouseX * -30}px, ${mouseY * -30}px)`"></div>
        <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[600px] h-[600px] bg-purple-500/10 rounded-full blur-3xl animate-pulse-slow"></div>
    </div>
    <div class="absolute inset-0 stripe-grid opacity-10" aria-hidden="true"></div>

    <div class="relative max-w-4xl mx-auto px-6 lg:px-8 text-center fade-up">
        <h2 class="font-display text-4xl md:text-5xl font-bold text-white mb-6 text-glow">
            ¿Listo para <span class="bg-gradient-to-r from-sky-400 via-blue-400 to-indigo-400 bg-clip-text text-transparent">transformar</span> tu negocio?
        </h2>
        <p class="text-xl text-slate-300 mb-10 max-w-2xl mx-auto leading-relaxed">
            Agenda una consulta gratuita y descubre cómo podemos ayudarte a alcanzar tus objetivos.
        </p>
        <div class="flex flex-col sm:flex-row gap-4 justify-center">
            <a href="#contacto"
               class="group px-8 py-4 bg-white text-slate-900 font-semibold rounded-full hover:bg-slate-50 transition-all duration-300 inline-flex items-center justify-center gap-2 shadow-xl shadow-white/10 hover:shadow-2xl hover:scale-105 active:scale-95">
                Agendar consulta
                <svg class="w-5 h-5 group-hover:translate-x-1 transition-transform duration-300" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 8l4 4m0 0l-4 4m4-4H3"/>
                </svg>
            </a>
            <a href="#servicios"
               class="group px-8 py-4 text-white font-semibold border border-white/30 rounded-full hover:bg-white/10 hover:border-white/50 transition-all duration-300 backdrop-blur-sm hover:scale-105 active:scale-95 inline-flex items-center justify-center gap-2">
                Ver servicios
                <svg class="w-4 h-4 group-hover:rotate-90 transition-transform duration-300" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/>
                </svg>
            </a>
        </div>
    </div>
</section>
