<!--
  templates/components/contact_multistep.html
  Formulario multi-step — Tailwind CSS puro, sin <style> propio.
  Sin panel/card propio — se adapta al contenedor que lo incluye.
  Uso: include 'components/contact_multistep.html' with source='page|hero|footer|modal'
  Dependencias: Alpine.js, Tailwind CSS
-->

{% load static %}

<div
  x-data="contactMultistep('{{ source|default:"page" }}')"
  x-init="init()"
  class="w-full"
  id="contact-multistep-{{ source|default:'page' }}"
>

<!-- ── BARRA DE PROGRESO ─────────────────────────────────────────── -->
    <div
      x-show="step < 4"
      x-transition:leave="transition ease-in duration-200"
      x-transition:leave-start="opacity-100"
      x-transition:leave-end="opacity-0"
      class="flex flex-col items-center gap-4 mb-10"
    >
      <div class="flex items-center gap-3">
        <template x-for="n in totalSteps" :key="n">
          <button
            type="button"
            :disabled="n > step"
            @click="n < step && goTo(n)"
            :aria-label="`Paso ${n}`"
            :class="{
              'w-12 h-3 bg-slate-900 border-slate-900 scale-110': n < step,
              'w-14 h-3 border-slate-900 bg-white scale-110': n === step,
              'w-6 h-2.5 border-slate-300 bg-transparent': n > step,
            }"
            class="rounded-full border-2 transition-all duration-300 ease-out focus:outline-none"
          ></button>
        </template>
      </div>

      <p class="text-sm text-slate-500 tracking-wide font-medium"
        x-text="`Paso ${step} de ${totalSteps}`">
      </p>
    </div>

  <!-- ── PASO 1: INTENCIÓN ─────────────────────────────────────────── -->
  <div
    x-show="step === 1"
    x-transition:enter="transition ease-out duration-200"
    x-transition:enter-start="opacity-0 translate-x-3"
    x-transition:enter-end="opacity-100 translate-x-0"
  >
    <h3 class="text-xl font-bold text-slate-900 mb-1">¿En qué podemos ayudarte?</h3>
    <p class="text-sm text-slate-500 mb-6">Elige una opción para comenzar</p>

    <div class="grid grid-cols-2 gap-3">

      <!-- Cotización -->
      <button type="button"
        @click="selectIntent('quote')"
        :class="intent === 'quote'
          ? 'border-slate-900 bg-slate-50 shadow-sm'
          : 'border-slate-200 hover:border-slate-300 hover:bg-slate-50/60'"
        class="flex flex-col items-start gap-2.5 p-4 rounded-2xl border-2 transition-all duration-200 text-left focus:outline-none focus-visible:ring-2 focus-visible:ring-slate-900">
        <div class="flex items-center justify-center w-9 h-9 rounded-xl bg-slate-100">
          <svg class="w-[18px] h-[18px] text-slate-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
              d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-6 9l2 2 4-4"/>
          </svg>
        </div>
        <div>
          <div class="text-sm font-semibold text-slate-900">Cotización</div>
          <div class="text-xs text-slate-400 mt-0.5">Necesito un presupuesto</div>
        </div>
      </button>

      <!-- Soporte -->
      <button type="button"
        @click="selectIntent('support')"
        :class="intent === 'support'
          ? 'border-slate-900 bg-slate-50 shadow-sm'
          : 'border-slate-200 hover:border-slate-300 hover:bg-slate-50/60'"
        class="flex flex-col items-start gap-2.5 p-4 rounded-2xl border-2 transition-all duration-200 text-left focus:outline-none focus-visible:ring-2 focus-visible:ring-slate-900">
        <div class="flex items-center justify-center w-9 h-9 rounded-xl bg-slate-100">
          <svg class="w-[18px] h-[18px] text-slate-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
              d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"/>
          </svg>
        </div>
        <div>
          <div class="text-sm font-semibold text-slate-900">Te orientamos</div>
          <div class="text-xs text-slate-400 mt-0.5">Necesito ayuda con mi sitio web</div>
        </div>
      </button>

      <!-- Consulta general -->
      <button type="button"
        @click="selectIntent('general')"
        :class="intent === 'general'
          ? 'border-slate-900 bg-slate-50 shadow-sm'
          : 'border-slate-200 hover:border-slate-300 hover:bg-slate-50/60'"
        class="col-span-2 flex items-center gap-4 p-4 rounded-2xl border-2 transition-all duration-200 text-left focus:outline-none focus-visible:ring-2 focus-visible:ring-slate-900">
        <div class="flex items-center justify-center w-9 h-9 rounded-xl bg-slate-100 shrink-0">
          <svg class="w-[18px] h-[18px] text-slate-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
              d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z"/>
          </svg>
        </div>
        <div>
          <div class="text-sm font-semibold text-slate-900">Consulta general</div>
          <div class="text-xs text-slate-400 mt-0.5">Tengo una pregunta</div>
        </div>
      </button>

    </div>
  </div>

  <!-- ── PASO 2: DATOS BÁSICOS ──────────────────────────────────────── -->
  <div
    x-show="step === 2"
    x-transition:enter="transition ease-out duration-200"
    x-transition:enter-start="opacity-0 translate-x-3"
    x-transition:enter-end="opacity-100 translate-x-0"
  >
    <h3 class="text-xl font-bold text-slate-900 mb-1">Danos estos datos para contactarte</h3>
    <p class="text-sm text-slate-500 mb-6">Solo necesitamos lo esencial</p>

    <div class="space-y-4 mb-6">

      <!-- Nombre -->
      <div class="flex flex-col gap-1.5">
        <label for="ms-name" class="text-xs font-semibold text-slate-500 uppercase tracking-wide">
          Tu nombre
        </label>
        <input
          id="ms-name" type="text" name="name"
          autocomplete="name" inputmode="text"
          x-model="fields.name" x-ref="nameInput"
          @blur="touch('name')"
          :class="touched.name && !fields.name
            ? 'border-red-400 focus:border-red-400 focus:ring-red-100'
            : 'border-slate-200 focus:border-slate-900 focus:ring-slate-100'"
          class="w-full px-4 py-3 rounded-xl border-2 bg-white text-slate-900 text-sm placeholder-slate-300 outline-none focus:ring-4 transition-all duration-200"
          placeholder="Ej: María González"
        >
        <p class="text-xs text-red-500" x-show="touched.name && !fields.name" x-transition>
          Por favor ingresa tu nombre.
        </p>
      </div>

      <!-- Email -->
      <div class="flex flex-col gap-1.5">
        <label for="ms-email" class="text-xs font-semibold text-slate-500 uppercase tracking-wide">
          Tu email
        </label>
        <input
          id="ms-email" type="email" name="email"
          autocomplete="email" inputmode="email"
          x-model="fields.email"
          @blur="touch('email')"
          :class="touched.email && !isValidEmail(fields.email)
            ? 'border-red-400 focus:border-red-400 focus:ring-red-100'
            : 'border-slate-200 focus:border-slate-900 focus:ring-slate-100'"
          class="w-full px-4 py-3 rounded-xl border-2 bg-white text-slate-900 text-sm placeholder-slate-300 outline-none focus:ring-4 transition-all duration-200"
          placeholder="tu@email.com"
        >
        <p class="text-xs text-red-500" x-show="touched.email && !isValidEmail(fields.email)" x-transition>
          Ingresa un email válido.
        </p>
      </div>

    </div>

    <button type="button" @click="nextStep()" :disabled="!canProceedStep2()"
      :class="canProceedStep2()
        ? 'bg-slate-900 hover:bg-slate-700 text-white cursor-pointer'
        : 'bg-slate-100 text-slate-400 cursor-not-allowed'"
      class="w-full flex items-center justify-center gap-2 px-6 py-3.5 rounded-xl text-sm font-semibold transition-all duration-200">
      Continuar
    </button>
  </div>

  <!-- ── PASO 3: CONTEXTO DINÁMICO ─────────────────────────────────── -->
  <div
    x-show="step === 3"
    x-transition:enter="transition ease-out duration-200"
    x-transition:enter-start="opacity-0 translate-x-3"
    x-transition:enter-end="opacity-100 translate-x-0"
  >
    <h3 class="text-xl font-bold text-slate-900 mb-1" x-text="step3Heading()"></h3>
    <p class="text-sm text-slate-500 mb-6" x-text="step3Subheading()"></p>

    <div class="space-y-4 mb-6">

      <!-- Empresa — solo cotización -->
      <div x-show="intent === 'quote'" x-transition class="flex flex-col gap-1.5">
        <label for="ms-company" class="text-xs font-semibold text-slate-500 uppercase tracking-wide">
          Empresa <span class="normal-case font-normal text-slate-400">(opcional)</span>
        </label>
        <input
          id="ms-company" type="text" name="company" autocomplete="organization"
          x-model="fields.company"
          class="w-full px-4 py-3 rounded-xl border-2 border-slate-200 bg-white text-slate-900 text-sm placeholder-slate-300 outline-none focus:border-slate-900 focus:ring-4 focus:ring-slate-100 transition-all duration-200"
          placeholder="Ej: Constructora Norte S.A."
        >
      </div>

      <!-- Teléfono — solo soporte -->
      <div x-show="intent === 'support'" x-transition class="flex flex-col gap-1.5">
        <label for="ms-phone" class="text-xs font-semibold text-slate-500 uppercase tracking-wide">
          Teléfono <span class="normal-case font-normal text-slate-400">(opcional)</span>
        </label>
        <input
          id="ms-phone" type="tel" name="phone" autocomplete="tel" inputmode="tel"
          x-model="fields.phone"
          class="w-full px-4 py-3 rounded-xl border-2 border-slate-200 bg-white text-slate-900 text-sm placeholder-slate-300 outline-none focus:border-slate-900 focus:ring-4 focus:ring-slate-100 transition-all duration-200"
          placeholder="+56 9 1234 5678"
        >
      </div>

      <!-- Mensaje -->
      <div class="flex flex-col gap-1.5">
        <div class="flex items-center justify-between">
          <label for="ms-message" class="text-xs font-semibold text-slate-500 uppercase tracking-wide"
            x-text="messageLabel()"></label>
          <span class="text-xs text-slate-400" x-text="fields.message.length + ' caracteres'"></span>
        </div>
        <textarea
          id="ms-message" name="message" rows="4"
          x-model="fields.message" x-ref="messageInput"
          @blur="touch('message')"
          :class="touched.message && fields.message.length < 10
            ? 'border-red-400 focus:border-red-400 focus:ring-red-100'
            : 'border-slate-200 focus:border-slate-900 focus:ring-slate-100'"
          class="w-full px-4 py-3 rounded-xl border-2 bg-white text-slate-900 text-sm placeholder-slate-300 outline-none focus:ring-4 transition-all duration-200 resize-none leading-relaxed"
          :placeholder="messagePlaceholder()"
        ></textarea>
        <p class="text-xs text-red-500" x-show="touched.message && fields.message.length < 10" x-transition>
          El mensaje debe tener al menos 10 caracteres.
        </p>
      </div>

    </div>

    <!-- Navegación paso 3 -->
    <div class="flex items-center gap-3">
      <button type="button" @click="prevStep()"
        class="flex items-center gap-1.5 px-4 py-3.5 rounded-xl border-2 border-slate-200 text-sm text-slate-500 font-medium hover:border-slate-400 hover:text-slate-700 transition-all duration-200 shrink-0">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 16l-4-4m0 0l4-4m-4 4h18"/>
        </svg>
        Volver
      </button>

      <button type="button" @click="submitForm()"
        :disabled="!canProceedStep3() || submitting"
        :class="canProceedStep3() && !submitting
          ? 'bg-slate-900 hover:bg-slate-700 text-white cursor-pointer'
          : 'bg-slate-100 text-slate-400 cursor-not-allowed'"
        class="flex-1 flex items-center justify-center gap-2 px-6 py-3.5 rounded-xl text-sm font-semibold transition-all duration-200">
        <span x-show="!submitting" class="flex items-center gap-2">
          Enviar mensaje
        </span>
        <span x-show="submitting" x-cloak class="flex items-center gap-2">
          <svg class="animate-spin w-4 h-4" fill="none" viewBox="0 0 24 24">
            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/>
            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"/>
          </svg>
          Enviando...
        </span>
      </button>
    </div>

    <!-- Error servidor -->
    <div x-show="serverError" x-transition
      class="mt-4 px-4 py-3 rounded-xl bg-red-50 border border-red-200 text-sm text-red-600 text-center"
      x-text="serverError">
    </div>

  </div>

  <!-- ── PASO 4: CONFIRMACIÓN ───────────────────────────────────────── -->
  <div
    x-show="step === 4"
    x-transition:enter="transition ease-out duration-300"
    x-transition:enter-start="opacity-0 scale-95"
    x-transition:enter-end="opacity-100 scale-100"
    class="flex flex-col items-center text-center py-6 gap-4"
  >
    <div class="w-14 h-14 rounded-2xl bg-slate-900 flex items-center justify-center">
      <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M5 13l4 4L19 7"/>
      </svg>
    </div>

    <div>
      <h3 class="text-xl font-bold text-slate-900 mb-1">¡Listo!</h3>
      <p class="text-sm text-slate-500 leading-relaxed">
        Te responderemos en menos de 24 horas a<br>
        <span class="font-semibold text-slate-700" x-text="fields.email"></span>
      </p>
    </div>

    <button type="button" @click="restart()"
      class="mt-1 px-5 py-2.5 rounded-xl border-2 border-slate-200 text-sm text-slate-500 font-medium hover:border-slate-400 hover:text-slate-700 transition-all duration-200">
      Enviar otro mensaje
    </button>
  </div>

  <!-- HONEYPOT -->
  <div aria-hidden="true" style="position:absolute;left:-9999px;top:-9999px;opacity:0;height:0;overflow:hidden;pointer-events:none;">
    <input type="text" name="website" tabindex="-1" autocomplete="off" x-model="honeypot">
  </div>

</div>

<style>[x-cloak]{display:none!important}</style>

<script>
function contactMultistep(formSource) {
  return {
    step: 1, totalSteps: 3, intent: '', submitting: false, serverError: '', honeypot: '',
    fields:  { name: '', email: '', phone: '', company: '', message: '' },
    touched: { name: false, email: false, message: false },
    formSource: formSource || 'page',
    submitUrl:  '{% url "contact_submit" %}',
    csrfToken:  '{{ csrf_token }}',

    init() {
      this.$watch('step', (val) => {
        this.$nextTick(() => {
          if (val === 2 && this.$refs.nameInput)    this.$refs.nameInput.focus();
          if (val === 3 && this.$refs.messageInput) this.$refs.messageInput.focus();
        });
      });
    },

    selectIntent(value) { this.intent = value; setTimeout(() => this.step = 2, 180); },
    nextStep()  { if (this.step === 2 && !this.canProceedStep2()) return; this.step++; },
    prevStep()  { if (this.step > 1) this.step--; },
    goTo(n)     { if (n < this.step) this.step = n; },

    isValidEmail(e) { return e && /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(e); },
    touch(f)        { this.touched[f] = true; },
    canProceedStep2() { return this.fields.name.trim().length >= 2 && this.isValidEmail(this.fields.email); },
    canProceedStep3() { return this.fields.message.trim().length >= 10; },

    step3Heading()    { return { quote: '¿Qué necesitas cotizar?', support: '¿Qué problema tienes?', general: '¿En qué podemos ayudarte?' }[this.intent] || 'Cuéntanos más'; },
    step3Subheading() { return { quote: 'Mientras más detalles, mejor podemos ayudarte', support: 'Describe el problema con el mayor detalle posible', general: 'Cualquier consulta es bienvenida' }[this.intent] || ''; },
    messageLabel()    { return { quote: 'Cuéntanos qué necesitas cotizar', support: 'Describe tu problema', general: 'Tu mensaje' }[this.intent] || 'Mensaje'; },
    messagePlaceholder() {
      return { quote: 'Ej: Necesito instalar una sala eléctrica de 100kW en una bodega de 500m²...', support: 'Ej: Desde ayer el sistema no enciende. Intenté reiniciar y el error persiste...', general: 'Escribe tu consulta aquí...' }[this.intent] || 'Escribe tu mensaje...';
    },

    async submitForm() {
      if (!this.canProceedStep3() || this.submitting) return;
      this.submitting = true; this.serverError = '';
      this.touched = { name: true, email: true, message: true };

      const payload = new FormData();
      payload.append('csrfmiddlewaretoken', this.csrfToken);
      payload.append('name',        this.fields.name.trim());
      payload.append('email',       this.fields.email.trim());
      payload.append('phone',       this.fields.phone.trim());
      payload.append('company',     this.fields.company.trim());
      payload.append('message',     this.fields.message.trim());
      payload.append('intent',      this.intent);
      payload.append('form_source', this.formSource);
      payload.append('website',     this.honeypot);

      try {
        const res  = await fetch(this.submitUrl, { method: 'POST', headers: { 'X-Requested-With': 'XMLHttpRequest' }, body: payload });
        const data = await res.json();
        if (data.ok)             this.step = 4;
        else if (res.status === 429) this.serverError = data.message || 'Demasiados intentos. Espera unos minutos.';
        else                     this.serverError = data.message || 'Ocurrió un error. Por favor intenta nuevamente.';
      } catch (err) {
        this.serverError = 'Error de conexión. Verifica tu internet e intenta nuevamente.';
      } finally {
        this.submitting = false;
      }
    },

    restart() {
      this.step = 1; this.intent = ''; this.serverError = ''; this.honeypot = '';
      this.fields  = { name: '', email: '', phone: '', company: '', message: '' };
      this.touched = { name: false, email: false, message: false };
    },
  };
}
</script>
