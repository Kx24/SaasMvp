<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Andesscale{% endblock %}</title>
    <!--[if mso]>
    <noscript>
        <xml>
            <o:OfficeDocumentSettings>
                <o:PixelsPerInch>96</o:PixelsPerInch>
            </o:OfficeDocumentSettings>
        </xml>
    </noscript>
    <![endif]-->
    <style>
        /* Reset */
        body, table, td, p, a, li, blockquote {
            -webkit-text-size-adjust: 100%;
            -ms-text-size-adjust: 100%;
        }
        table, td {
            mso-table-lspace: 0pt;
            mso-table-rspace: 0pt;
        }
        img {
            -ms-interpolation-mode: bicubic;
            border: 0;
            height: auto;
            line-height: 100%;
            outline: none;
            text-decoration: none;
        }
        
        /* Base */
        body {
            margin: 0 !important;
            padding: 0 !important;
            background-color: #f4f4f5;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
        }
        
        /* Container */
        .email-container {
            max-width: 600px;
            margin: 0 auto;
            background-color: #ffffff;
        }
        
        /* Header */
        .email-header {
            background-color: #2563eb;
            padding: 24px;
            text-align: center;
        }
        .email-header img {
            max-height: 40px;
        }
        .email-header h1 {
            color: #ffffff;
            font-size: 24px;
            font-weight: 700;
            margin: 0;
        }
        
        /* Body */
        .email-body {
            padding: 32px 24px;
        }
        
        /* Typography */
        h1 {
            color: #111827;
            font-size: 24px;
            font-weight: 700;
            margin: 0 0 16px;
        }
        h2 {
            color: #111827;
            font-size: 20px;
            font-weight: 600;
            margin: 0 0 12px;
        }
        p {
            color: #4b5563;
            font-size: 16px;
            line-height: 1.6;
            margin: 0 0 16px;
        }
        
        /* Buttons */
        .btn {
            display: inline-block;
            padding: 14px 28px;
            background-color: #2563eb;
            color: #ffffff !important;
            text-decoration: none;
            font-weight: 600;
            font-size: 16px;
            border-radius: 8px;
            margin: 8px 0;
        }
        .btn:hover {
            background-color: #1d4ed8;
        }
        .btn-secondary {
            background-color: #6b7280;
        }
        .btn-success {
            background-color: #059669;
        }
        
        /* Cards/Boxes */
        .info-box {
            background-color: #f3f4f6;
            border-radius: 8px;
            padding: 20px;
            margin: 20px 0;
        }
        .success-box {
            background-color: #ecfdf5;
            border: 1px solid #a7f3d0;
            border-radius: 8px;
            padding: 20px;
            margin: 20px 0;
        }
        .warning-box {
            background-color: #fffbeb;
            border: 1px solid #fde68a;
            border-radius: 8px;
            padding: 20px;
            margin: 20px 0;
        }
        .alert-box {
            background-color: #fef2f2;
            border: 1px solid #fecaca;
            border-radius: 8px;
            padding: 20px;
            margin: 20px 0;
        }
        
        /* Details list */
        .details-list {
            margin: 16px 0;
        }
        .details-list dt {
            color: #6b7280;
            font-size: 14px;
            margin-bottom: 4px;
        }
        .details-list dd {
            color: #111827;
            font-size: 16px;
            font-weight: 500;
            margin: 0 0 12px;
        }
        
        /* Footer */
        .email-footer {
            background-color: #f9fafb;
            padding: 24px;
            text-align: center;
            border-top: 1px solid #e5e7eb;
        }
        .email-footer p {
            color: #6b7280;
            font-size: 14px;
            margin: 0 0 8px;
        }
        .email-footer a {
            color: #2563eb;
            text-decoration: none;
        }
        
        /* Utilities */
        .text-center {
            text-align: center;
        }
        .text-small {
            font-size: 14px;
            color: #6b7280;
        }
        .text-muted {
            color: #9ca3af;
        }
        .mt-0 { margin-top: 0; }
        .mb-0 { margin-bottom: 0; }
        .mt-4 { margin-top: 16px; }
        .mb-4 { margin-bottom: 16px; }
        
        /* Responsive */
        @media screen and (max-width: 600px) {
            .email-container {
                width: 100% !important;
            }
            .email-body {
                padding: 24px 16px !important;
            }
        }
    </style>
</head>
<body>
    <center style="width: 100%; background-color: #f4f4f5; padding: 24px 0;">
        <!--[if mso]>
        <table role="presentation" cellspacing="0" cellpadding="0" border="0" width="600" align="center">
        <tr>
        <td>
        <![endif]-->
        
        <table role="presentation" cellspacing="0" cellpadding="0" border="0" class="email-container" style="margin: auto;">
            <!-- Header -->
            <tr>
                <td class="email-header">
                    <h1>{{ company_name|default:"Andesscale" }}</h1>
                </td>
            </tr>
            
            <!-- Body -->
            <tr>
                <td class="email-body">
                    {% block content %}{% endblock %}
                </td>
            </tr>
            
            <!-- Footer -->
            <tr>
                <td class="email-footer">
                    {% block footer %}
                    <p>
                        ¿Tienes dudas? Escríbenos a 
                        <a href="/cdn-cgi/l/email-protection#e59e9ec5969095958a9791ba8088848c89c59898">{{ support_email }}</a>
                    </p>
                    <p class="text-muted" style="margin-top: 16px;">
                        © {% now "Y" %} {{ company_name }}. Todos los derechos reservados.
                    </p>
                    {% endblock %}
                </td>
            </tr>
        </table>
        
        <!--[if mso]>
        </td>
        </tr>
        </table>
        <
